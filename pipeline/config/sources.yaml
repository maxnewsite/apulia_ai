# Query Google News — scoperta notizie non coperte dai feed curati
google_news_queries:
  # Policy e normativa UE
  - '"EU AI Act" OR "AI Act europeo"'
  - '"intelligenza artificiale" normativa UE OR Europa'
  - '"European Commission" AI OR "artificial intelligence" policy'
  - '"AI Act" compliance OR enforcement'

  # Investimenti e startup
  - 'AI startup Italia funding OR finanziamento'
  - 'AI Europe startup "Series A" OR "Series B" OR "seed" 2026'
  - 'intelligenza artificiale investimento Italia OR Spagna OR Francia OR Germania'
  - 'AI Europe venture capital funding'

  # Paesi UE specifici
  - 'AI Italy OR Italia intelligenza artificiale'
  - 'AI France OR Mistral AI OR "French AI"'
  - 'AI Germany OR Germania OR "German AI" Aleph Alpha'
  - 'AI Spain OR Spagna OR Barcelona AI'
  - 'AI Netherlands OR Olanda OR Amsterdam AI'
  - 'AI Sweden OR Svezia OR Stockholm AI'
  - 'AI Poland OR Polonia OR Warsaw AI'

  # Aziende europee rilevanti
  - 'Mistral AI OR "Aleph Alpha" OR "Stability AI" OR "Hugging Face"'
  - 'AI "Made in Italy" OR "National AI strategy" Europe'
  - 'CINECA OR "IIT Istituto Italiano" AI OR "Fondazione Bruno Kessler"'

  # Infrastrutture
  - 'AI "data center" Europa OR Italy OR France OR Germany'
  - 'GPU supercomputer Europa OR Italy AI'
  - 'cloud AI sovrano Europa OR sovereign AI Europe'

  # Sanità e settori verticali
  - 'AI healthcare Europa OR sanità intelligenza artificiale'
  - 'AI fintech Europa OR banca intelligenza artificiale'
  - 'AI difesa Europa OR "defense AI" Europe'
  - 'AI ricerca università Europa OR "AI research" Europe university'

  # Incidenti e sicurezza
  - 'AI incidente OR deepfake Europa OR Italy 2026'
  - 'AI safety bias rischio Europa'

